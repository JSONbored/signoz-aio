[upstream]
name = "SigNoz"
type = "github-tag"
repo = "SigNoz/signoz"
image = "signoz/signoz"
version_source = "dockerfile-arg"
version_key = "UPSTREAM_SIGNOZ_VERSION"
digest_source = "dockerhub-manifest"
digest_key = "UPSTREAM_SIGNOZ_DIGEST"
strategy = "pr"
stable_only = true

[compose_dependencies]
path = "deploy/docker/docker-compose.yaml"
UPSTREAM_OTELCOL_VERSION = "signoz/signoz-otel-collector"
UPSTREAM_CLICKHOUSE_VERSION = "clickhouse/clickhouse-server"
UPSTREAM_ZOOKEEPER_VERSION = "signoz/zookeeper"

[notifications]
release_notes_url = "https://github.com/SigNoz/signoz/releases"
