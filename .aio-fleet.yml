schema_version: 1
repo: signoz-aio
github_repo: JSONbored/signoz-aio
app_slug: signoz-aio
image:
  name: jsonbored/signoz-aio
  cache_scope: signoz-aio-image
  pytest_tag: signoz-aio:pytest
  publish_platforms: linux/amd64
release:
  name: SigNoz-AIO
  profile: signoz-suite
  previous_tag_command: latest-aio-tag
upstream:
  name: SigNoz
  version_key: UPSTREAM_SIGNOZ_VERSION
  digest_arg: UPSTREAM_SIGNOZ_DIGEST
  commit_paths:
    - Dockerfile
    - components/signoz-agent/Dockerfile
  components:
    - signoz-aio
    - signoz-agent
  monitor:
    - component: aio
      name: SigNoz
      source: github-tags
      repo: SigNoz/signoz
      image: signoz/signoz
      digest_source: dockerhub
      dockerfile: Dockerfile
      version_key: UPSTREAM_SIGNOZ_VERSION
      digest_key: UPSTREAM_SIGNOZ_DIGEST
      stable_only: true
      strategy: pr
      release_notes_url: https://github.com/SigNoz/signoz/releases
    - component: agent
      name: OpenTelemetry Collector Contrib
      source: github-tags
      repo: open-telemetry/opentelemetry-collector-releases
      image: otel/opentelemetry-collector-contrib
      digest_source: dockerhub
      dockerfile: components/signoz-agent/Dockerfile
      version_key: UPSTREAM_OTELCOL_VERSION
      version_strip_prefix: v
      digest_key: UPSTREAM_OTELCOL_DIGEST
      stable_only: true
      strategy: pr
      release_notes_url: https://github.com/open-telemetry/opentelemetry-collector-releases/releases
template:
  xml_paths:
    - signoz-aio.xml
    - signoz-agent.xml
    - assets/**
  generated: false
catalog:
  published: true
  assets:
    - source: signoz-aio.xml
      target: signoz-aio.xml
    - source: signoz-agent.xml
      target: signoz-agent.xml
    - source: assets/app-icon.png
      target: icons/signoz.png
tests:
  unit: tests/template
  integration: tests/integration -m integration
  checkout_submodules: false
validation:
  required_text_fields:
    - ExtraSearchTerms
    - Requires
    - DonateText
    - DonateLink
components:
  aio:
    xml_paths:
      - signoz-aio.xml
    upstream_version_key: UPSTREAM_SIGNOZ_VERSION
    release_suffix: aio
    validation:
      required_targets:
        - /appdata
        - /hostfs
        - /var/lib/docker/containers
        - /var/run/docker.sock
        - "4317"
        - "4318"
        - "8080"
        - LOW_CARDINAL_EXCEPTION_GROUPING
        - OTEL_RESOURCE_ATTRIBUTES
        - SIGNOZ_AIO_WAIT_TIMEOUT_SECONDS
