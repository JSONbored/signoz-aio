name: Check SigNoz Upstream

on:
  schedule:
    - cron: 23 7 * * 1
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-upstream:
    uses: JSONbored/aio-fleet/.github/workflows/aio-check-upstream.yml@3b8613bf305a8bbebfe9f61636db935c303fe2cd
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      workflow_title: Check SigNoz Upstream
      component_matrix: '["signoz-aio", "signoz-agent"]'
      commit_paths: |
        Dockerfile
        components/signoz-agent/Dockerfile
    secrets: inherit
