name: Check SigNoz Upstream

on:
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-upstream:
    uses: JSONbored/aio-fleet/.github/workflows/aio-check-upstream.yml@388300f0f98701ea81bd8185660257d06cd8f472
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      workflow_title: Check SigNoz Upstream
      component_matrix: '["signoz-aio", "signoz-agent"]'
      commit_paths: |
        Dockerfile
        components/signoz-agent/Dockerfile
    secrets: inherit
