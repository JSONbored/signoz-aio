receivers:
  prometheus:
    config:
      global:
        scrape_interval: 30s
      scrape_configs:
        - job_name: app_metrics
          metrics_path: /metrics
          static_configs:
            - targets:
                - app1:9100
                - app2:8080

processors:
  batch: {}
  resourcedetection:
    detectors: [env, system]
    timeout: 2s
    override: false
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  otlp:
    endpoint: YOUR-UNRAID-IP:4317
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlp]
